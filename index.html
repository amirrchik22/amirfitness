
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amir Fitness Neon Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #05040d;
        --bg-1: #100726;
        --bg-2: #081d2f;
        --card: rgba(10, 16, 36, 0.84);
        --line: rgba(0, 245, 255, 0.24);
        --text: #e7efff;
        --muted: #8fa2cc;
        --cyan: #00f5ff;
        --pink: #ff2c9c;
        --green: #39ff14;
        --orange: #ff9f1a;
        --danger: #ff4f6e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Manrope', sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 12% 14%, #22114f 0, transparent 38%),
          radial-gradient(circle at 86% 18%, #2a0e3a 0, transparent 30%),
          radial-gradient(circle at 65% 78%, #032b40 0, transparent 40%),
          linear-gradient(150deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
        padding: 18px;
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
        border: 1px solid rgba(0, 245, 255, 0.24);
        background: rgba(6, 10, 24, 0.74);
        backdrop-filter: blur(16px);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45), 0 0 42px rgba(0, 245, 255, 0.08);
      }

      .topbar {
        padding: 18px 20px;
        border-bottom: 1px solid rgba(0, 245, 255, 0.2);
        background: linear-gradient(110deg, rgba(0, 245, 255, 0.06), rgba(255, 44, 156, 0.08));
      }

      .top-grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .title {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin: 0;
        font-size: clamp(18px, 2.8vw, 28px);
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .top-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .btn,
      button,
      .chip {
        border: 1px solid transparent;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 14px;
        cursor: pointer;
        font: inherit;
        min-height: 42px;
        touch-action: manipulation;
      }

      .btn-neon {
        border-color: rgba(0, 245, 255, 0.6);
        box-shadow: 0 0 20px rgba(0, 245, 255, 0.2), inset 0 0 18px rgba(0, 245, 255, 0.1);
      }

      .btn-pink {
        border-color: rgba(255, 44, 156, 0.66);
        box-shadow: 0 0 18px rgba(255, 44, 156, 0.22), inset 0 0 12px rgba(255, 44, 156, 0.12);
      }

      .btn:active,
      .chip:active {
        transform: translateY(1px);
      }

      .date-input {
        background: rgba(3, 8, 22, 0.75);
        border: 1px solid rgba(0, 245, 255, 0.35);
        border-radius: 10px;
        color: var(--text);
        padding: 10px;
      }

      .nav {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(0, 245, 255, 0.16);
        background: rgba(6, 11, 28, 0.64);
      }

      .nav button {
        flex: 0 0 auto;
        border-color: rgba(143, 162, 204, 0.3);
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 12px;
      }

      .nav button.active {
        color: #fff;
        border-color: rgba(0, 245, 255, 0.74);
        box-shadow: 0 0 20px rgba(0, 245, 255, 0.22);
      }

      .content {
        padding: 16px;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 16px;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .value {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 800;
        font-family: 'Orbitron', sans-serif;
      }

      .value.cyan {
        color: var(--cyan);
      }

      .value.pink {
        color: var(--pink);
      }

      .value.green {
        color: var(--green);
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .tasks {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .task {
        border: 1px solid rgba(143, 162, 204, 0.25);
        border-radius: 12px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        background: rgba(5, 8, 18, 0.6);
      }

      .task label {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .task span {
        font-size: 12px;
        color: var(--muted);
      }

      input[type='checkbox'] {
        width: 18px;
        height: 18px;
        accent-color: var(--cyan);
      }

      .progress-line {
        width: 100%;
        height: 9px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .progress-line > i {
        display: block;
        height: 100%;
        border-radius: inherit;
      }

      .line-cyan {
        background: linear-gradient(90deg, #00bcd4, #00f5ff);
      }

      .line-pink {
        background: linear-gradient(90deg, #d3007f, #ff2c9c);
      }

      .line-green {
        background: linear-gradient(90deg, #20c300, #39ff14);
      }

      .line-orange {
        background: linear-gradient(90deg, #ea8100, #ffb347);
      }

      .list {
        margin: 10px 0 0;
        padding-left: 18px;
        color: #cbd8ff;
      }

      .list li + li {
        margin-top: 8px;
      }

      .bars {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
        align-items: end;
        height: 130px;
      }

      .bar {
        border-radius: 10px 10px 4px 4px;
        background: linear-gradient(180deg, rgba(0, 245, 255, 0.9), rgba(0, 245, 255, 0.2));
        min-height: 8px;
        position: relative;
      }

      .bar small {
        position: absolute;
        width: 100%;
        bottom: -20px;
        text-align: center;
        color: var(--muted);
        font-size: 10px;
      }

      .subtabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
      }

      .subtabs button {
        border-color: rgba(143, 162, 204, 0.3);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 700;
        font-size: 12px;
      }

      .subtabs button.active {
        color: var(--text);
        border-color: rgba(255, 44, 156, 0.7);
        box-shadow: 0 0 16px rgba(255, 44, 156, 0.25);
      }

      .subview {
        display: none;
      }

      .subview.active {
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }

      th,
      td {
        border-bottom: 1px solid rgba(143, 162, 204, 0.2);
        text-align: left;
        padding: 8px 6px;
        font-size: 12px;
      }

      th {
        color: #b8c8f5;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      form {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      form .full {
        grid-column: 1 / -1;
      }

      input,
      select,
      textarea {
        width: 100%;
        background: rgba(3, 7, 19, 0.85);
        border: 1px solid rgba(0, 245, 255, 0.28);
        border-radius: 10px;
        color: var(--text);
        padding: 10px;
        font: inherit;
      }

      input,
      select,
      textarea,
      button {
        -webkit-tap-highlight-color: transparent;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .chip {
        font-size: 12px;
        border-color: rgba(0, 245, 255, 0.45);
        background: rgba(0, 245, 255, 0.07);
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        border-top: 1px solid rgba(0, 245, 255, 0.2);
        padding: 10px 16px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        background: rgba(7, 20, 37, 0.96);
        border: 1px solid rgba(0, 245, 255, 0.56);
        color: var(--text);
        padding: 12px 14px;
        border-radius: 12px;
        box-shadow: 0 0 16px rgba(0, 245, 255, 0.2);
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: all 0.2s ease;
        max-width: 360px;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .loading {
        opacity: 0.55;
        pointer-events: none;
      }

      @media (max-width: 1024px) {
        .grid-4,
        .grid-3,
        .grid-2 {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        form {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 700px) {
        body {
          padding: 8px;
          padding-bottom: calc(110px + env(safe-area-inset-bottom));
        }

        .grid-4,
        .grid-3,
        .grid-2,
        .tasks,
        form {
          grid-template-columns: 1fr;
        }

        .top-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          padding: 12px;
        }

        .title {
          font-size: clamp(18px, 7vw, 24px);
        }

        .subtitle {
          font-size: 12px;
        }

        .top-actions {
          width: 100%;
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 8px;
        }

        .date-input {
          min-height: 44px;
          font-size: 16px;
        }

        .content {
          padding: 10px;
          padding-bottom: 18px;
        }

        .card {
          border-radius: 14px;
          padding: 12px;
        }

        .value {
          font-size: 23px;
        }

        .nav {
          position: fixed;
          left: 8px;
          right: 8px;
          bottom: calc(8px + env(safe-area-inset-bottom));
          z-index: 40;
          padding: 8px;
          gap: 8px;
          border: 1px solid rgba(0, 245, 255, 0.28);
          border-radius: 14px;
          background: rgba(4, 10, 26, 0.95);
          box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45), 0 0 20px rgba(0, 245, 255, 0.1);
        }

        .nav button {
          min-height: 44px;
          min-width: 96px;
          padding: 10px 8px;
          font-size: 11px;
          letter-spacing: 0.03em;
        }

        .status {
          flex-direction: column;
          align-items: flex-start;
          gap: 4px;
        }

        input,
        select,
        textarea,
        button {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell" id="appShell">
      <header class="topbar">
        <div class="top-grid">
          <div>
            <h1 class="title">Amir Neon Fitness</h1>
            <div class="subtitle" id="subtitleLine">Личный контроль сушки, силы, колена и ротаторки</div>
          </div>
          <div class="top-actions">
            <input type="date" id="selectedDate" class="date-input" />
            <button class="btn btn-neon" id="openDbBtn" type="button">Открыть БД</button>
          </div>
        </div>
      </header>

      <nav class="nav" id="mainNav">
        <button class="active" data-view="dashboard" type="button">Главная</button>
        <button data-view="plan" type="button">План</button>
        <button data-view="nutrition" type="button">Питание</button>
        <button data-view="progress" type="button">Прогресс</button>
        <button data-view="recovery" type="button">Восстановление</button>
        <button data-view="guide" type="button">Инструкция</button>
        <button data-view="settings" type="button">Настройки</button>
      </nav>

      <main class="content" id="contentRoot">
        <section class="view active" id="view-dashboard"></section>
        <section class="view" id="view-plan"></section>
        <section class="view" id="view-nutrition"></section>
        <section class="view" id="view-progress"></section>
        <section class="view" id="view-recovery"></section>
        <section class="view" id="view-guide"></section>
        <section class="view" id="view-settings"></section>
      </main>

      <footer class="status">
        <div id="statusText">Готов к загрузке данных…</div>
        <div id="statusMeta"></div>
      </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // Вставь сюда URL вида https://script.google.com/macros/s/....../exec
      const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbz22_zGhijilQWdaf8B5se_Orj6aCoqu0FwhU84McJ_QLt1jq3GfVqQq3lH6FSaNR3J/exec';
      // Опционально: если в Apps Script задан write token (setWriteToken), пропиши его сюда.
      const API_WRITE_TOKEN = '';

      const state = {
        data: null,
        activeView: 'dashboard',
        planTab: 'strength',
        loading: false,
      };

      document.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('selectedDate');
        dateInput.value = formatDateForInput(new Date());

        bindStaticEvents();
        loadData(dateInput.value);
      });

      function bindStaticEvents() {
        document.getElementById('mainNav').addEventListener('click', (event) => {
          const btn = event.target.closest('button[data-view]');
          if (!btn) return;
          setActiveView(btn.dataset.view);
        });

        document.getElementById('selectedDate').addEventListener('change', (event) => {
          loadData(event.target.value);
        });

        document.getElementById('openDbBtn').addEventListener('click', () => {
          if (!state.data || !state.data.meta || !state.data.meta.databaseUrl) {
            toast('Сначала дождись загрузки данных.');
            return;
          }
          window.open(state.data.meta.databaseUrl, '_blank');
        });

        document.getElementById('contentRoot').addEventListener('click', handleDynamicClick);
        document.getElementById('contentRoot').addEventListener('change', handleDynamicChange);
        document.getElementById('contentRoot').addEventListener('submit', handleDynamicSubmit);
      }

      function loadData(dateIso) {
        setLoading(true, 'Загружаю базу и расчет дневного состояния…');
        apiRequest('bootstrap', { date: dateIso || formatDateForInput(new Date()) })
          .then((data) => {
            if (!data || typeof data !== 'object') {
              state.data = null;
              renderEmptyState(
                'Сервер вернул пустые данные. Проверь API URL и deployment Apps Script.'
              );
              setLoading(false, 'Пустой ответ от сервера');
              toast('Пустой ответ от API. Проверь action=bootstrap и deployment.');
              return;
            }
            state.data = data;
            state.loading = false;
            renderAll();
            setLoading(false, 'Данные обновлены');
          })
          .catch((error) => {
            setLoading(false, 'Ошибка загрузки');
            renderEmptyState(error && error.message ? error.message : 'Не удалось загрузить данные');
            toast(error && error.message ? error.message : 'Не удалось загрузить данные');
          });
      }

      function setLoading(flag, message) {
        state.loading = flag;
        document.getElementById('appShell').classList.toggle('loading', flag);
        document.getElementById('statusText').textContent = message || '';
      }

      function setActiveView(viewName) {
        state.activeView = viewName;
        document.querySelectorAll('#mainNav button').forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.view === viewName);
        });
        document.querySelectorAll('.view').forEach((section) => {
          section.classList.toggle('active', section.id === `view-${viewName}`);
        });
      }

      function renderAll() {
        if (!state.data || !state.data.meta) {
          renderEmptyState('Нет данных для отрисовки. Проверь backend и deployment.');
          return;
        }

        const dateInput = document.getElementById('selectedDate');
        if (state.data.meta && state.data.meta.date) {
          dateInput.value = state.data.meta.date;
        }

        document.getElementById('statusMeta').textContent =
          `Дата: ${state.data.meta.date} | TZ: ${state.data.meta.timezone}`;

        renderDashboard();
        renderPlan();
        renderNutrition();
        renderProgress();
        renderRecovery();
        renderGuide();
        renderSettings();
        setActiveView(state.activeView);
      }

      function renderEmptyState(message) {
        const safe = escapeHtml(message || 'Нет данных');
        document.querySelectorAll('.view').forEach((section) => {
          section.innerHTML = `
            <article class="card" style="margin-top:8px;">
              <div class="label">Диагностика</div>
              <div style="margin-top:8px;">${safe}</div>
            </article>
          `;
        });
      }

      function renderDashboard() {
        const root = document.getElementById('view-dashboard');
        const profile = state.data.profile || {};
        const todayPlan = state.data.todayPlan || {};
        const meals = state.data.meals || {};
        const rec = state.data.recommendations || [];
        const completion = (state.data.weekPlan && state.data.weekPlan.completion) || [];

        const weightNow = toNum(profile.weight_kg, 0);
        const proteinLeft = toNum(meals.left && meals.left.protein, 0);
        const caloriesLeft = toNum(meals.left && meals.left.calories, 0);

        root.innerHTML = `
          <div class="grid grid-4">
            <article class="card">
              <div class="label">Текущий вес</div>
              <div class="value cyan">${formatNum(weightNow, 1)} кг</div>
            </article>
            <article class="card">
              <div class="label">Осталось калорий</div>
              <div class="value ${caloriesLeft >= 0 ? 'green' : 'pink'}">${formatNum(caloriesLeft, 0)}</div>
            </article>
            <article class="card">
              <div class="label">Белок до цели</div>
              <div class="value ${proteinLeft >= 0 ? 'cyan' : 'pink'}">${formatNum(proteinLeft, 1)} г</div>
            </article>
            <article class="card">
              <div class="label">Цель</div>
              <div class="value" style="font-size:16px;line-height:1.3;">${escapeHtml(profile.goal_primary || 'Сушка + мышцы')}</div>
            </article>
          </div>

          <div class="grid grid-2" style="margin-top:12px;">
            <article class="card">
              <div class="label">План на сегодня</div>
              <div class="tasks" style="margin-top:10px;">
                ${taskToggleHtml('Силовая', 'strength', todayPlan.strength_planned, todayPlan.strength_done)}
                ${taskToggleHtml('Кардио', 'cardio', todayPlan.cardio_planned, todayPlan.cardio_done)}
                ${taskToggleHtml('Колено', 'knee', todayPlan.knee_planned, todayPlan.knee_done)}
                ${taskToggleHtml('Плечо/ротаторка', 'shoulder', todayPlan.shoulder_planned, todayPlan.shoulder_done)}
              </div>
              <div class="muted" style="margin-top:8px;">Шаги: ${formatNum(todayPlan.steps_target, 0)} | Вода: ${formatNum(todayPlan.water_target_ml, 0)} мл</div>
            </article>

            <article class="card">
              <div class="label">Питание сегодня</div>
              <div style="margin-top:8px;">
                ${macroLine('Калории', meals.summary && meals.summary.calories, meals.targets && meals.targets.calories, 'line-pink')}
                ${macroLine('Белок', meals.summary && meals.summary.protein, meals.targets && meals.targets.protein, 'line-cyan')}
                ${macroLine('Жиры', meals.summary && meals.summary.fat, meals.targets && meals.targets.fat, 'line-orange')}
                ${macroLine('Углеводы', meals.summary && meals.summary.carbs, meals.targets && meals.targets.carbs, 'line-green')}
              </div>
            </article>
          </div>

          <div class="grid grid-2" style="margin-top:12px;">
            <article class="card">
              <div class="label">Рекомендации на день</div>
              <ul class="list">${rec.map((r) => `<li>${escapeHtml(r)}</li>`).join('')}</ul>
            </article>

            <article class="card">
              <div class="label">Прогресс недели</div>
              <div class="bars" style="margin-top:8px;">
                ${renderCompletionBars(completion)}
              </div>
            </article>
          </div>

          <article class="card" style="margin-top:12px;">
            <div class="label">Быстрая заметка</div>
            <form id="journalForm">
              <input type="hidden" name="date" value="${escapeHtml(state.data.meta.date)}" />
              <select name="category">
                <option value="Тренировка">Тренировка</option>
                <option value="Питание">Питание</option>
                <option value="Колено">Колено</option>
                <option value="Плечо">Плечо</option>
                <option value="Общее">Общее</option>
              </select>
              <input name="entry" class="full" placeholder="Что заметил сегодня: нагрузка, боль, форма, еда" required />
              <button class="btn btn-neon" type="submit">Сохранить заметку</button>
            </form>
          </article>
        `;
      }

        return `
          <div style="margin-bottom:8px;">
            <div class="row" style="justify-content:space-between;">
              <strong>${label}</strong>
              <span class="muted">${formatNum(f, 1)} / ${formatNum(t, 1)}</span>

        `;
      }

        return completion
          .map((row) => {
            const pct = Math.round(Math.max(0, Math.min(1, toNum(row.ratio, 0))) * 100);
            const h = Math.max(8, Math.round((pct / 100) * 110));
            const day = String(row.date || '').slice(5);
            return `<div class="bar" style="height:${h}px;"><small>${day}</small></div>`;
          })
          .join('');

      function renderWeightBars(series) {
        if (!series.length) {
          return '<div class="muted">Заполни хотя бы один замер веса.</div>';
        }

        const values = series.map((x) => toNum(x.weight_kg, 0));
        const min = Math.min(...values);
        const max = Math.max(...values);
        const range = Math.max(max - min, 0.5);

        return series
          .map((row) => {
            const v = toNum(row.weight_kg, 0);
            const pct = ((v - min) / range) * 100;
            const h = Math.max(12, Math.round(pct * 1.2 + 25));
            const day = String(row.date || '').slice(5);
            return `<div class="bar" style="height:${h}px;"><small>${day}</small></div>`;
          })
          .join('');
      }

                <li>В `Прогрессе` внеси вес/замеры (минимум 2-3 раза в неделю).</li>
              </ol>
            </article>

            <article class="card">
              <div class="label">Шкала боли и действия</div>
              <ol class="list">
                <li>0-3: работай по плану, контроль техники.</li>
                <li>4-5: снизь веса и объем на 20-30%.</li>
                <li>6+: убери ударные нагрузки, только щадящее кардио и протоколы.</li>
                <li>Если 6+ держится 3 дня подряд — делай разгрузочную неделю.</li>
              </ol>
            </article>
          </div>

          <div class="grid grid-2" style="margin-top:12px;">
            <article class="card">
              <div class="label">Быстрый старт за 3 минуты</div>
              <ol class="list">
                <li>Проверь дату: <strong>${escapeHtml(date)}</strong>.</li>
                <li>В `Главная` закрой чекбоксы по плану дня.</li>
                <li>В `Питание` добавь хотя бы 1 прием пищи.</li>
                <li>В `Восстановление` поставь энергию, колено, плечо.</li>
              </ol>
            </article>

            <article class="card">
              <div class="label">Если что-то не работает</div>
              <ol class="list">
                <li>Проверь `API_BASE_URL` в коде сайта.</li>
                <li>Проверь `.../exec?action=ping` и `.../exec?action=bootstrap`.</li>
                <li>Если включен токен записи — проверь `API_WRITE_TOKEN`.</li>
                <li>Обнови deployment Apps Script до новой версии.</li>
              </ol>
            </article>
          </div>
        `;
      }

      function renderSettings() {
        const root = document.getElementById('view-settings');
        const p = state.data.profile || {};
        const s = state.data.settings || {};

        root.innerHTML = `
          <article class="card">
            <div class="label">Персональные параметры и цели</div>
            <form id="settingsForm" style="margin-top:10px;">
              <input name="height_cm" type="number" step="1" placeholder="Рост, см" value="${escapeAttr(p.height_cm || '')}" />
              <input name="weight_kg" type="number" step="0.1" placeholder="Вес, кг" value="${escapeAttr(p.weight_kg || '')}" />
              <input name="age" type="number" step="1" placeholder="Возраст" value="${escapeAttr(p.age || '')}" />
              <input name="daily_calories_target" type="number" step="1" placeholder="Калории/день" value="${escapeAttr(
                s.daily_calories_target || ''
              )}" />
              <input name="protein_target_g" type="number" step="1" placeholder="Белок, г" value="${escapeAttr(
                s.protein_target_g || ''
              )}" />
              <input name="fat_target_g" type="number" step="1" placeholder="Жиры, г" value="${escapeAttr(
                s.fat_target_g || ''
              )}" />
              <input name="carbs_target_g" type="number" step="1" placeholder="Углеводы, г" value="${escapeAttr(
                s.carbs_target_g || ''
              )}" />
              <input name="water_target_ml" type="number" step="50" placeholder="Вода, мл" value="${escapeAttr(
                s.water_target_ml || ''
              )}" />
              <input name="steps_target" type="number" step="100" placeholder="Шаги" value="${escapeAttr(s.steps_target || '')}" />
              <input name="training_days_per_week" type="number" min="1" max="7" step="1" placeholder="Тренировок в неделю" value="${escapeAttr(
                s.training_days_per_week || ''
              )}" />
              <input name="session_minutes" type="number" step="5" placeholder="Длительность, мин" value="${escapeAttr(
                s.session_minutes || ''
              )}" />
              <select name="running_enabled">
                <option value="true" ${toBool(s.running_enabled) ? 'selected' : ''}>Бег включен</option>
                <option value="false" ${!toBool(s.running_enabled) ? 'selected' : ''}>Бег выключен</option>
              </select>
              <select name="intervals_enabled">
                <option value="true" ${toBool(s.intervals_enabled) ? 'selected' : ''}>Интервалы включены</option>
                <option value="false" ${!toBool(s.intervals_enabled) ? 'selected' : ''}>Интервалы выключены</option>
              </select>
              <input class="full" name="goal_primary" placeholder="Главная цель" value="${escapeAttr(p.goal_primary || '')}" />
              <input class="full" name="goal_secondary" placeholder="Доп. цель" value="${escapeAttr(p.goal_secondary || '')}" />
              <button class="btn btn-neon" type="submit">Сохранить настройки</button>
            </form>
            <div class="muted" style="margin-top:10px;">База данных: <a href="${escapeAttr(
              state.data.meta.databaseUrl
            )}" target="_blank" style="color:var(--cyan)">Google Sheet</a></div>
          </article>
        `;
      }
      function handleDynamicClick(event) {
        const tabBtn = event.target.closest('[data-plan-tab]');
        if (tabBtn) {
          state.planTab = tabBtn.dataset.planTab;
          renderPlan();
          return;
        }

        const templateBtn = event.target.closest('.template-add');
        if (templateBtn) {
          runServer('addMealFromTemplate', {
            date: state.data.meta.date,
            meal_type: 'Шаблон',
            template_name: templateBtn.dataset.template,
          });
          return;
        }

        const taskBtn = event.target.closest('.mark-task-btn');
        if (taskBtn) {
          runServer('saveTaskStatus', {
            date: state.data.meta.date,
            task: taskBtn.dataset.task,
            done: true,
          });
        }
      }

      function handleDynamicChange(event) {
        const checkbox = event.target.closest('.task-toggle');
        if (!checkbox) return;

        runServer('saveTaskStatus', {
          date: state.data.meta.date,
          task: checkbox.dataset.task,
          done: checkbox.checked,
        });
      }

      function handleDynamicSubmit(event) {
        const form = event.target.closest('form');
        if (!form) return;

        event.preventDefault();
        const data = formToObj(form);

        if (form.id === 'mealForm') {
          runServer('saveMeal', data);
          form.reset();
          return;
        }

        if (form.id === 'strengthLogForm') {
          runServer('saveStrengthLog', data);
          form.reset();
          return;
        }

        if (form.id === 'cardioLogForm') {
          runServer('saveCardioLog', data);
          form.reset();
          return;
        }

        if (form.id === 'recoveryForm') {
          runServer('saveRecoveryLog', data);
          return;
        }

        if (form.id === 'progressForm') {
          runServer('saveProgressEntry', data);
          return;
        }

        if (form.id === 'settingsForm') {
          runServer('saveSettingsPayload', {
            profile: {
              height_cm: data.height_cm,
              weight_kg: data.weight_kg,
              age: data.age,
              goal_primary: data.goal_primary,
              goal_secondary: data.goal_secondary,
            },
            settings: {
              daily_calories_target: data.daily_calories_target,
              protein_target_g: data.protein_target_g,
              fat_target_g: data.fat_target_g,
              carbs_target_g: data.carbs_target_g,
              water_target_ml: data.water_target_ml,
              steps_target: data.steps_target,
              training_days_per_week: data.training_days_per_week,
              session_minutes: data.session_minutes,
              running_enabled: data.running_enabled,
              intervals_enabled: data.intervals_enabled,
            },
          });
          return;
        }

        if (form.id === 'journalForm') {
          runServer('addJournalNote', data);
          form.reset();
        }
      }

      function runServer(method, payload) {
        setLoading(true, 'Сохраняю изменения…');
        apiRequest(method, payload || {})
          .then((data) => {
            state.data = data;
            renderAll();
            setLoading(false, 'Синхронизировано с Google Таблицей');
            toast('Данные сохранены');
          })
          .catch((error) => {
            setLoading(false, 'Ошибка сохранения');
            toast(error && error.message ? error.message : 'Ошибка при сохранении');
          });
      }

      function apiRequest(action, payload) {
        return new Promise((resolve, reject) => {
          if (!API_BASE_URL || API_BASE_URL.includes('PASTE_APPS_SCRIPT_WEB_APP_EXEC_URL')) {
            reject(new Error('Укажи API_BASE_URL в index.html (ссылка /exec из Apps Script).'));
            return;
          }

          const callbackName = `fitnessJsonp_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
          const body = Object.assign({}, payload || {});
          if (needsWriteToken(action) && API_WRITE_TOKEN) {
            body.token = API_WRITE_TOKEN;
          }

          const url = new URL(API_BASE_URL);
          url.searchParams.set('action', action);
          url.searchParams.set('payload', JSON.stringify(body));
          url.searchParams.set('callback', callbackName);
          url.searchParams.set('_', String(Date.now()));

          const script = document.createElement('script');
          script.src = url.toString();
          script.async = true;

          let done = false;
          const cleanup = () => {
            if (done) return;
            done = true;
            try {
              delete window[callbackName];
            } catch (_) {
              window[callbackName] = undefined;
            }
            if (script.parentNode) {
              script.parentNode.removeChild(script);
            }
          };

          window[callbackName] = (response) => {
            cleanup();
            if (!response || !response.ok) {
              reject(new Error((response && response.error) || 'Apps Script API вернул ошибку.'));
              return;
            }
            resolve(response.data);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('Не удалось обратиться к Apps Script API. Проверь URL /exec и права доступа.'));
          };

          document.head.appendChild(script);
        });
      }

      function needsWriteToken(action) {
        return [
          'setupDatabase',
          'saveTaskStatus',
          'saveMeal',
          'addMealFromTemplate',
          'saveRecoveryLog',
          'saveProgressEntry',
          'saveStrengthLog',
          'saveCardioLog',
          'addJournalNote',
          'saveSettingsPayload',
        ].includes(action);
      }

      function yesNo(done, planned) {
        if (!toBool(planned)) return '—';
        return toBool(done) ? 'Да' : 'Нет';
      }

      function recoveryCoachText(today) {
        const sleep = toNum(today.sleep_h, 0);
        const knee = toNum(today.knee_pain, 0);
        const shoulder = toNum(today.shoulder_pain, 0);
        const ready = toNum(today.readiness, 0);

        if (knee >= 6) return 'Колено в риске: без интервального бега, только щадящее кардио и протокол стабилизации.';
        if (shoulder >= 6) return 'Плечо требует разгрузки: снизь жимы, добавь ротаторку и контроль лопатки.';
        if (sleep > 0 && sleep < 7) return 'Сон низкий: лучше урезать объем и держать технику/качество движения.';
        if (ready > 0 && ready <= 4) return 'Низкая готовность: делай легкий день, фокус на мобильность и восстановление.';
        return 'Состояние стабильное: можно работать по плану с контролем болевых сигналов.';
      }

      function formToObj(form) {
        const fd = new FormData(form);
        const out = {};
        for (const [key, value] of fd.entries()) {
          out[key] = value;
        }
        return out;
      }

      function toNum(value, fallback = 0) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function toBool(value) {
        if (value === true || value === false) return value;
        const x = String(value ?? '').toLowerCase();
        return x === 'true' || x === '1' || x === 'yes' || x === 'да';
      }

      function formatNum(value, digits = 0) {
        const n = toNum(value, 0);
        return n.toLocaleString('ru-RU', {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        });
      }

      function formatDateForInput(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll('`', '&#96;');
      }

      let toastTimer;
      function toast(message) {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
      }
    </script>
  </body>
